# Generates the contribution-snake animation referenced in README.md.
# It builds SVGs from your contribution graph and pushes them to the "output"
# branch, where the README loads them from.
#
# Setup (one time):
#   1. Settings → Actions → General → Workflow permissions → "Read and write".
#   2. Push this file, then trigger once via Actions → "Generate Snake" → Run workflow.
# After that it refreshes automatically every 12 hours.
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # allow manual run from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
